<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificador de Tiroides AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-cyan-400">Análisis Tiroideo</h1>
        <form id="thyroidForm" class="space-y-4">
            <input type="number" step="any" id="t3_resin" placeholder="T3-Resin Uptake" class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-cyan-500 text-white" required>
            <input type="number" step="any" id="t4_total" placeholder="Serum T4 Total" class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-cyan-500 text-white" required>
            <input type="number" step="any" id="t3_total" placeholder="Serum T3 Total" class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-cyan-500 text-white" required>
            <input type="number" step="any" id="tsh" placeholder="Serum TSH" class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-cyan-500 text-white" required>
            <input type="number" step="any" id="t4_diff" placeholder="Max TSH Diff" class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-cyan-500 text-white" required>
            <button type="button" onclick="predecir()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold transition">Analizar</button>
        </form>
        <div id="result" class="mt-6 p-4 rounded-lg hidden text-center font-bold border-2 border-cyan-500 text-cyan-400"></div>
    </div>

    <script>
        async function predecir() {
            const resultDiv = document.getElementById('result');
            const payload = {
                t3_resin: document.getElementById('t3_resin').value,
                t4_total: document.getElementById('t4_total').value,
                t3_total: document.getElementById('t3_total').value,
                tsh: document.getElementById('tsh').value,
                t4_diff: document.getElementById('t4_diff').value
            };

            try {
                // Ruta relativa crucial para Vercel
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                resultDiv.innerText = `Diagnóstico: ${data.diagnostico}`;
                resultDiv.classList.remove('hidden');
            } catch (e) {
                alert("Error conectando con el servidor");
            }
        }
    </script>
</body>
</html>
