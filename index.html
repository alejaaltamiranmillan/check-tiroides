<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Desencriptador</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4"
  >
    <div
      class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-2xl border border-slate-700"
    >
      <h1 class="text-2xl font-bold mb-6 text-center text-amber-400">
        Desencriptador
      </h1>

      <form id="decryptForm" class="space-y-4">
        <textarea
          id="encrypted_text"
          rows="12"
          placeholder="Pega aquí el texto cifrado"
          class="w-full p-3 rounded bg-slate-700 border border-slate-600 outline-none focus:border-amber-400 text-white"
          required
        ></textarea>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <button
            type="button"
            id="btn-decrypt"
            onclick="desencriptar()"
            class="w-full bg-amber-600 hover:bg-amber-500 py-3 rounded-lg font-bold transition"
          >
            Desencriptar
          </button>
          <button
            type="button"
            id="btn-clear"
            onclick="clearInput()"
            class="w-full bg-slate-600 hover:bg-slate-500 py-3 rounded-lg transition"
          >
            Limpiar
          </button>
        </div>
      </form>

      <div
        id="decrypt_result"
        class="mt-6 p-4 rounded-lg hidden font-medium border-2 border-amber-400 text-amber-200"
      ></div>
      <div id="decrypt_attempts" class="mt-3 text-sm text-slate-300"></div>
    </div>

    <script>
      async function desencriptar() {
        const div = document.getElementById("decrypt_result");
        const attemptsDiv = document.getElementById("decrypt_attempts");
        const text = document.getElementById("encrypted_text").value;
        div.classList.add("hidden");
        attemptsDiv.innerHTML = "";

        try {
          const payload = { texto: text };

          const resp = await fetch("/api/decrypt", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await resp.json();

          if (data.status === "success") {
            let out = "";
            out += `<div><strong>Método decodificado:</strong> ${data.method}</div>`;
            out += `<div><strong>Tipo detectado:</strong> ${data.file_type}</div>`;

            if (data.text) {
              out += `<pre class="whitespace-pre-wrap mt-2 text-sm bg-slate-800 p-3 rounded">${escapeHtml(data.text)}</pre>`;
            } else if (data.bytes_base64) {
              out += `<div class="mt-2">Contenido binario (base64):</div><textarea readonly class="w-full p-2 mt-1 bg-slate-800 rounded text-sm">${data.bytes_base64}</textarea>`;
            }

            div.innerHTML = out;
            div.classList.remove("hidden");

            if (Array.isArray(data.attempts)) {
              attemptsDiv.innerHTML =
                "<strong>Intentos:</strong> " +
                data.attempts
                  .map(
                    (a) =>
                      `${a.method} [${a.file_type}]${a.has_text ? " ✅" : ""}`,
                  )
                  .join(", ");
            }
          } else {
            alert("Error: " + (data.message || "Desconocido"));
          }
        } catch (e) {
          alert("Error conectando al servidor");
        }
      }

      function clearInput() {
        document.getElementById("encrypted_text").value = "";
        document.getElementById("decrypt_result").classList.add("hidden");
        document.getElementById("decrypt_attempts").innerHTML = "";
      }

      function escapeHtml(unsafe) {
        if (!unsafe) return "";
        return String(unsafe)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }
    </script>
  </body>
</html>
